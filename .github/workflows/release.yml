name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/ci.yml"
      - ".github/workflows/canary.yml"
      - "README.md"
  workflow_dispatch:
    inputs:
      bump:
        description: "Force version bump (overrides commit detection)"
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Determine version bump from commits
        id: bump
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LAST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since $LAST_TAG:"
          echo "$COMMITS"

          BUMP="none"

          # Check for breaking changes (major)
          if echo "$COMMITS" | grep -qiE "^.+!:|BREAKING CHANGE"; then
            BUMP="major"
          # Check for features (minor)
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          # Check for fixes, perf, refactor (patch)
          elif echo "$COMMITS" | grep -qiE "^(fix|perf|refactor)(\(.+\))?:"; then
            BUMP="patch"
          fi

          # Manual override from workflow_dispatch
          MANUAL_BUMP="${{ github.event.inputs.bump }}"
          if [ -n "$MANUAL_BUMP" ] && [ "$MANUAL_BUMP" != "auto" ]; then
            BUMP="$MANUAL_BUMP"
            echo "Manual bump override: $BUMP"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version-worthy commits found, skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
            echo "Detected bump: $BUMP"
          fi

      - name: Bump version and tag
        if: steps.bump.outputs.skip != 'true'
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use latest git tag as the base version (package.json may be stale
          # since we don't push version bump commits to the protected branch)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT="${LATEST_TAG#v}"
          echo "Current version from tag: $CURRENT"

          # Sync package.json to the tag version before bumping
          npm version "$CURRENT" --no-git-tag-version --allow-same-version

          # Bump version
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "New version: $NEW_VERSION"

          # Create an annotated tag without pushing the commit to the protected branch
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

      - name: Publish to npm
        if: steps.bump.outputs.skip != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
